name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# The job authenticates to Cloudflare with its own API token; it only needs to
# read this repo's contents, so the GITHUB_TOKEN is scoped down accordingly.
permissions:
  contents: read

# Never run two deploys for the same ref at once; cancel an in-flight one when a
# newer commit lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      # No dependency cache is enabled (no `cache:` input), so there is no
      # restore cache to poison; the zizmor finding is a low-confidence false
      # positive for setup-node in a publishing workflow.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        # Authenticates the build-time GitHub API calls (tooling section) to lift
        # the shared-runner rate limit. Read-only, per the permissions block.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Idempotent: creates the Pages project on the very first run, then errors
      # harmlessly (already exists) on every run after — hence continue-on-error.
      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.100.0"
          command: pages project create ourovoros-site --production-branch=main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.100.0"
          command: pages deploy dist --project-name=ourovoros-site --branch=main
